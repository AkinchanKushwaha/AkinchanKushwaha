<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" role="img"
  aria-label="Akinchan's kitchen: the microwave has cooked 806 commits; the fridge runs the build. Compiled hot, served cold.">
  <title>compiled hot · served cold</title>
  <style>
    text { font-family: ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace; }
    .dg { font-size: 21px; font-weight: 700; fill: #41e58a; text-anchor: middle; }
    .tm { font-size: 9px; }
    @keyframes rollin { from { transform: translateY(0); } }
    @keyframes typeslide { from { transform: translateX(0); } }
    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes breathe { 0%, 100% { opacity: .45; } 50% { opacity: .9; } }
    @keyframes warmpulse { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
    @keyframes floaty {
      0% { opacity: 0; transform: translateY(0); }
      18% { opacity: .95; }
      75%, 100% { opacity: 0; transform: translateY(-26px); }
    }
    @keyframes steam {
      0% { opacity: 0; transform: translateY(4px); }
      30% { opacity: .55; }
      75%, 100% { opacity: 0; transform: translateY(-14px); }
    }
    @keyframes blip { 0%, 70% { opacity: 1; } 75%, 95% { opacity: .15; } 100% { opacity: 1; } }
    @keyframes flow { to { stroke-dashoffset: -14; } }
    @keyframes ding {
      0% { opacity: 0; transform: scale(.5); }
      12% { opacity: 1; transform: scale(1.18); }
      24% { transform: scale(1); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-8px); }
    }
    .pop { transform-box: fill-box; transform-origin: center; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
